<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Học Viện Âm Nhạc Toàn Diện - Master Class v7.0</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root {
--primary: #0f172a; --accent: #fbbf24; --secondary: #6366f1;
--bg: #f8fafc; --card: #ffffff; --text: #1e293b;
--italic-font: 'Georgia', serif;
}
* { box-sizing: border-box; scroll-behavior: smooth; }
body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: var(--text); }

header {
background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
color: white; padding: 40px 20px; text-align: center;
}

nav {
display: flex; justify-content: center; background: white;
position: sticky; top: 0; padding: 10px;
}

nav button {
background: none; border: none; padding: 10px 15px;
font-weight: 700; cursor: pointer;
}

nav button.active {
background: var(--primary); color: white;
}

.container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }

.piano-outer {
background: #000; padding: 20px; border-radius: 20px;
text-align: center;
}

.piano { display: flex; position: relative; width: 840px; margin: auto; }

.white-key {
width: 70px; height: 240px; background: white;
display: flex; align-items: flex-end; justify-content: center;
}

.black-key {
width: 46px; height: 140px; background: black;
position: absolute; margin-left: -23px;
}

.section { display: none; }
.section.active { display: block; }

.card {
background: #fff; padding: 20px; border-radius: 10px;
margin-top: 20px;
}
</style>
</head>

<body>

<header>
<h1>Music <span style="color:gold;">Master</span></h1>
<p>Kho học nhạc toàn diện</p>
</header>

<nav>
<button onclick="showTab('piano-tab', this)" class="active">🎹 Piano</button>
<button onclick="showTab('theory-tab', this)">📜 Nhạc lý</button>
</nav>

<div class="container">

<!-- PIANO -->
<div id="piano-tab" class="section active">
<div class="piano-outer">

<div id="game-msg">Luyện tai nghe</div>

<button onclick="startEarTest()">Phát nốt</button>
<br><br>
<button onclick="showTheory()">📘 Học lý thuyết</button>
<button onclick="testMove()">🎯 Test đọc nốt</button>

<div class="piano">
<div class="white-key key" data-note="C" data-freq="261.63">C</div>
<div class="black-key key" style="left:70px" data-note="C#" data-freq="277.18"></div>
<div class="white-key key" data-note="D" data-freq="293.66">D</div>
<div class="black-key key" style="left:140px" data-note="D#" data-freq="311.13"></div>
<div class="white-key key" data-note="E" data-freq="329.63">E</div>
<div class="white-key key" data-note="F" data-freq="349.23">F</div>
<div class="black-key key" style="left:280px" data-note="F#" data-freq="369.99"></div>
<div class="white-key key" data-note="G" data-freq="392.00">G</div>
<div class="black-key key" style="left:350px" data-note="G#" data-freq="415.30"></div>
<div class="white-key key" data-note="A" data-freq="440.00">A</div>
<div class="black-key key" style="left:420px" data-note="A#" data-freq="466.16"></div>
<div class="white-key key" data-note="B" data-freq="493.88">B</div>
<div class="white-key key" data-note="C5" data-freq="523.25">C5</div>
</div>

</div>
</div>

<!-- THEORY -->
<div id="theory-tab" class="section">
<div class="card">
<h2>Dynamics</h2>
<p>&lt; / &gt; = Crescendo / Decrescendo</p>
</div>
</div>

</div>

<footer style="text-align:center;">© 2026 Music Master</footer>

<script>
// AUDIO
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let targetNote = null;

function playNote(freq){
audioCtx.resume();
const osc = audioCtx.createOscillator();
const gain = audioCtx.createGain();
osc.frequency.value = freq;
osc.connect(gain);
gain.connect(audioCtx.destination);
osc.start();
osc.stop(audioCtx.currentTime + 1);
}

function startEarTest(){
const keys = document.querySelectorAll('.key');
const random = keys[Math.floor(Math.random()*keys.length)];
targetNote = random.dataset.note;
playNote(random.dataset.freq);
document.getElementById("game-msg").innerText="Nghe và đoán!";
}

document.querySelectorAll('.key').forEach(k=>{
k.addEventListener("click",()=>{
playNote(k.dataset.freq);

if(targetNote){
if(k.dataset.note===targetNote){
alert("Đúng!");
targetNote=null;
}else{
alert("Sai! Đáp án: "+targetNote);
}
}
});
});

// TAB
function showTab(id, el){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
document.getElementById(id).classList.add('active');
el.classList.add('active');
}

// AI
class PianoLearningAssistant{
constructor(){
this.notes=['Do','Re','Mi','Fa','Sol','La','Si'];
this.line_notes=['Mi','Sol','Si','Re','Fa'];
this.space_notes=['Fa','La','Do','Mi'];
}

learnTheory(){
return "Dòng: "+this.line_notes.join(", ")+"\nKhe: "+this.space_notes.join(", ");
}

moveFinger(a,b){
let s=this.notes.indexOf(a);
let e=this.notes.indexOf(b);
if(s==-1||e==-1) return "Sai nốt";

let d=e-s;
return d>0? "Lên "+d : "Xuống "+Math.abs(d);
}
}

const ai=new PianoLearningAssistant();

function showTheory(){
alert(ai.learnTheory());
}

function testMove(){
let a=prompt("Nốt 1");
let b=prompt("Nốt 2");
alert(ai.moveFinger(a,b));
}
</script>
  <!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Master PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body { font-family: Inter; background:#0f172a; color:white; text-align:center; }
.piano { display:flex; position:relative; width:840px; margin:auto; }
.white { width:70px; height:220px; background:white; color:black; }
.black { width:40px; height:130px; background:black; position:absolute; margin-left:-20px; color:white; }
button { margin:5px; padding:10px; border:none; border-radius:8px; cursor:pointer; }
#noteDisplay { font-size:24px; margin:10px; }
</style>
</head>

<body>

<h1>🎹 Music Master PRO</h1>

<div id="noteDisplay">Chưa bấm nốt</div>

<button onclick="startGame()">🎧 Game nghe nốt</button>
<button onclick="showTheory()">📘 Lý thuyết</button>
<button onclick="testMove()">🎯 Test ngón</button>
<button onclick="detectChord()">🎹 Nhận diện hợp âm</button>

<p>Điểm: <span id="score">0</span></p>

<div class="piano" id="piano"></div>

<script>
// TẠO PIANO
const notes = [
["C",261],["C#",277],["D",293],["D#",311],["E",329],
["F",349],["F#",369],["G",392],["G#",415],
["A",440],["A#",466],["B",493],["C5",523]
];

const piano = document.getElementById("piano");

notes.forEach((n,i)=>{
let key=document.createElement("div");
key.className = n[0].includes("#")?"black":"white";
key.innerText=n[0];
key.dataset.note=n[0];
key.dataset.freq=n[1];

if(n[0].includes("#")){
key.style.left=(i*70)+"px";
}

piano.appendChild(key);
});

// AUDIO
const ctx=new (window.AudioContext||window.webkitAudioContext)();

function play(freq){
ctx.resume();
let o=ctx.createOscillator();
let g=ctx.createGain();
o.frequency.value=freq;
o.connect(g); g.connect(ctx.destination);
o.start(); o.stop(ctx.currentTime+1);
}

// GAME
let target=null;
let score=0;

function startGame(){
target=notes[Math.floor(Math.random()*notes.length)][0];
play(notes.find(n=>n[0]==target)[1]);
}

document.querySelectorAll(".white,.black").forEach(k=>{
k.addEventListener("click",()=>{
let note=k.dataset.note;
play(k.dataset.freq);

document.getElementById("noteDisplay").innerText="Bạn bấm: "+note;

if(target){
if(note===target){
score++;
document.getElementById("score").innerText=score;
alert("Đúng!");
}else{
alert("Sai! Đáp án: "+target);
}
target=null;
}
});
});

// AI
class AI{
constructor(){
this.notes=["Do","Re","Mi","Fa","Sol","La","Si"];
}

learn(){
return "Do Re Mi Fa Sol La Si";
}

move(a,b){
let s=this.notes.indexOf(a);
let e=this.notes.indexOf(b);
if(s<0||e<0) return "Sai";
return e>s?"Lên":"Xuống";
}
}

const ai=new AI();

function showTheory(){
alert(ai.learn());
}

function testMove(){
let a=prompt("Nốt 1");
let b=prompt("Nốt 2");
alert(ai.move(a,b));
}

// CHORD
let pressed=[];

document.querySelectorAll(".white,.black").forEach(k=>{
k.addEventListener("mousedown",()=>{
pressed.push(k.dataset.note);
});
});

function detectChord(){
if(pressed.includes("C")&&pressed.includes("E")&&pressed.includes("G")){
alert("Hợp âm C Major");
}else{
alert("Chưa nhận diện được");
}
pressed=[];
}
</script>

</body>
</html>
  

</body>
</html>
